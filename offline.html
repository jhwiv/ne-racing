<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Railbird AI — Offline</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<style>
  html,body{margin:0;height:100%;background:#0D3320;color:#F8F4EA;font:16px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
  h1{font-size:22px;margin:0 0 8px}
  p{opacity:.85;margin:6px 0}
  button{margin-top:18px;background:#D4A849;color:#0D3320;border:0;padding:12px 22px;border-radius:10px;font-weight:600;font-size:15px;cursor:pointer}
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <h1>You're offline</h1>
      <p>Railbird AI needs a network connection to pull live entries.</p>
      <p>Re-connect, then tap retry.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </div>
</body>
</html>
