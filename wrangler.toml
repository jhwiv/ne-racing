name = "cloudflare-worker"
main = "worker.js"
compatibility_date = "2024-09-23"

[vars]
DATA_SOURCE = "theracingapi"
DEFAULT_TRACK = "SAR"
ALLOWED_ORIGIN = "https://railbirdai.com"
# v2.32.3 — SendGrid feedback email delivery (FEEDBACK_EMAIL_TO, FEEDBACK_EMAIL_FROM,
# FEEDBACK_SENDGRID_KEY, FEEDBACK_ADMIN_TOKEN are stored as encrypted Worker secrets,
# not plain vars — see `wrangler secret list` / Cloudflare dashboard)

# v2.32.0 — FEEDBACK_LOG KV namespace for beta feedback catalog
[[kv_namespaces]]
binding = "FEEDBACK_LOG"
id = "f4480a5e92fa463a88e014541224b85f"

# v2.33.0 (PR #2) — RACE_HISTORY KV: durable archive of finished race cards.
# Populated by handleResults() after a successful fetch when at least one race
# is `official: true`. Read by /api/history/* endpoints and the offline backtest.
#
# Before first deploy, create the namespace and paste its id here:
#   wrangler kv:namespace create RACE_HISTORY
#   wrangler kv:namespace create RACE_HISTORY --preview
[[kv_namespaces]]
binding = "RACE_HISTORY"
id = "REPLACE_WITH_RACE_HISTORY_KV_ID"
preview_id = "REPLACE_WITH_RACE_HISTORY_PREVIEW_KV_ID"

# v2.33.0 (PR #2) — ENGINE_ACCURACY KV: per-engine pick + outcome log.
# Written by /api/picks/log + /api/picks/settle. Powers /api/picks/stats and
# downstream conditional-logit refits.
#
#   wrangler kv:namespace create ENGINE_ACCURACY
#   wrangler kv:namespace create ENGINE_ACCURACY --preview
[[kv_namespaces]]
binding = "ENGINE_ACCURACY"
id = "REPLACE_WITH_ENGINE_ACCURACY_KV_ID"
preview_id = "REPLACE_WITH_ENGINE_ACCURACY_PREVIEW_KV_ID"

[observability]
enabled = true
