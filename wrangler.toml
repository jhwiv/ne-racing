name = "cloudflare-worker"
main = "worker.js"
compatibility_date = "2024-09-23"

[vars]
DATA_SOURCE = "theracingapi"
DEFAULT_TRACK = "SAR"
ALLOWED_ORIGIN = "https://railbirdai.com"
# v2.32.3 — SendGrid feedback email delivery (FEEDBACK_EMAIL_TO, FEEDBACK_EMAIL_FROM,
# FEEDBACK_SENDGRID_KEY, FEEDBACK_ADMIN_TOKEN are stored as encrypted Worker secrets,
# not plain vars — see `wrangler secret list` / Cloudflare dashboard)

# v2.32.0 — FEEDBACK_LOG KV namespace for beta feedback catalog
[[kv_namespaces]]
binding = "FEEDBACK_LOG"
id = "f4480a5e92fa463a88e014541224b85f"

# v2.38.21 — BETA_VISITS KV namespace for device-count user tracking.
# One key per device UUID: seen:<uuid> -> { first_seen, last_seen,
# visit_count, last_ua_short, last_version }. Read by token-gated
# /api/admin/users endpoint, written by POST /api/beta-ping on app boot.
[[kv_namespaces]]
binding = "BETA_VISITS"
id = "88359534063440468af41dccfa3233cd"

# v2.39.0 — BETA_REQUESTS KV: pending access requests from invitees.
# Key: req:<id> -> { id, first, last, email, invited_by, created_at,
# status: 'pending'|'approved'|'rejected', ip, ua }. TTL: none (manual).
[[kv_namespaces]]
binding = "BETA_REQUESTS"
id = "93a68573bb29466d93098731e1962db7"

# v2.39.0 — BETA_ACCESS KV: minted access tokens. Each tester who's been
# approved gets a record. Key: tok:<accessToken> -> { first, last, email,
# invited_by, created_at, request_id, last_used_at }. App's /?approved=<tok>
# unlock path looks up here to set localStorage flag.
[[kv_namespaces]]
binding = "BETA_ACCESS"
id = "c5947eb94d814f5da1c0b970c444e6ef"

# v2.33.0 (PR #2) — RACE_HISTORY KV: durable archive of finished race cards.
# Populated by handleResults() after a successful fetch when at least one race
# is `official: true`. Read by /api/history/* endpoints and the offline backtest.
[[kv_namespaces]]
binding = "RACE_HISTORY"
id = "2a935fd865e343989836a9e1be30b89b"
preview_id = "ff40f130e66c4c92bac005d5f19ef1cc"

# v2.33.0 (PR #2) — ENGINE_ACCURACY KV: per-engine pick + outcome log.
# Written by /api/picks/log + /api/picks/settle. Powers /api/picks/stats and
# downstream conditional-logit refits.
[[kv_namespaces]]
binding = "ENGINE_ACCURACY"
id = "d4523fe63a12409795fea068ac61874e"
preview_id = "dced19300ac24b7cb59fd8ab96fe17f1"

# v2.37.0 — RAILBIRD D1: Equibase past-performance + result chart archive.
# Populated by the off-band Dropbox→parser pipeline (railbird_pp_parser.ts +
# railbird_d1_loader.ts). Tables: horse, race, pp_entry, pp_past_race,
# pp_past_point_of_call, pp_workout, pp_race_summary, person, etc.
# Read via /api/d1/horse/:name and /api/d1/horse-stats/:name.
[[d1_databases]]
binding = "RAILBIRD_DB"
database_name = "railbird"
database_id = "dd369ea1-023a-4eaa-941f-50124f6beace"

[observability]
enabled = true

# v2.47.0 — Cron triggers for the scheduled pre-warmer.
#
# Cloudflare's caches.default is partitioned per edge / colo, so the very
# first user to hit a cold colo paid the full 24 s upstream + enrichment
# cost for /api/entries (and iOS Safari often aborted the slow fetch,
# which surfaced as the "Dark day at Saratoga" offday dashboard mid-meet).
#
# These cron triggers run the worker's scheduled() handler, which calls
# handleEntries() internally for SAR (today + tomorrow ET) and writes the
# assembled payload to caches.default + the ENTRIES_R2 bucket. By the time
# a real user request lands on any colo, the entries response has been
# warmed there at least once.
#
# Cadence:
#   - Every 5 min from 13:00 UTC (09:00 ET) to 23:00 UTC (19:00 ET)
#     covers the full SAR card window with margin on either side.
#   - One nightly tick at 11:00 UTC (07:00 ET) refreshes overnight
#     after the upstream feeds publish next-day entries.
#
# All times are UTC. America/New_York is UTC−4 (EDT) during meet season.
[triggers]
crons = [
  "*/5 13-22 * * *",  # every 5 min, 09:00 ET → 18:55 ET (race-day window)
  "0 23 * * *",        # 19:00 ET — final post-card warm
  "0 11 * * *",        # 07:00 ET — morning warm after upstream publish
]

# v2.47.0 — R2 bucket for the static-entries fallback.
#
# The scheduled() handler mirrors each successful warm into this bucket
# at key `entries/{TRACK}-{YYYY-MM-DD}.json`. The new public route
# GET /api/entries/r2?track=SAR&date=... streams it back without ever
# touching the upstream API or the enrichment pipeline. The client uses
# this as a worker-down fallback when the primary entries call times
# out or 5xxs.
#
# Create the bucket once (one-time) before deploying this worker:
#   wrangler r2 bucket create railbird-entries
[[r2_buckets]]
binding = "ENTRIES_R2"
bucket_name = "railbird-entries"
