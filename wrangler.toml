name = "cloudflare-worker"
main = "worker.js"
compatibility_date = "2024-09-23"

[vars]
DATA_SOURCE = "theracingapi"
DEFAULT_TRACK = "SAR"
ALLOWED_ORIGIN = "https://railbirdai.com"
# v2.32.3 — SendGrid feedback email delivery (FEEDBACK_EMAIL_TO, FEEDBACK_EMAIL_FROM,
# FEEDBACK_SENDGRID_KEY, FEEDBACK_ADMIN_TOKEN are stored as encrypted Worker secrets,
# not plain vars — see `wrangler secret list` / Cloudflare dashboard)

# v2.32.0 — FEEDBACK_LOG KV namespace for beta feedback catalog
[[kv_namespaces]]
binding = "FEEDBACK_LOG"
id = "f4480a5e92fa463a88e014541224b85f"

# v2.33.0 (PR #2) — RACE_HISTORY + ENGINE_ACCURACY KV bindings intentionally
# omitted at initial ship. The Worker guards every KV access (`if (!env.X)`),
# so the new history-archive and engine-accuracy endpoints return 503 until
# the namespaces are created and these blocks are re-added:
#
#   wrangler kv:namespace create RACE_HISTORY
#   wrangler kv:namespace create RACE_HISTORY --preview
#   wrangler kv:namespace create ENGINE_ACCURACY
#   wrangler kv:namespace create ENGINE_ACCURACY --preview
#
# Bet Evaluator UI, fitted weights, and A/B toggle do not depend on these KVs.

[observability]
enabled = true
