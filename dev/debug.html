<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Railbird AI — Debug</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #1B4332; color: #FAF3E0; padding: 1rem; font-size: 14px; }
  h1 { font-size: 1.2rem; margin-bottom: 1rem; color: #C9A84C; }
  .section { background: rgba(255,255,255,0.08); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
  .section h2 { font-size: 0.95rem; color: #C9A84C; margin-bottom: 0.5rem; }
  .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .label { opacity: 0.7; }
  .value { font-weight: 600; text-align: right; max-width: 60%; word-break: break-all; }
  .ok { color: #4CAF50; }
  .bad { color: #FF5252; }
  .warn { color: #FFC107; }
  .btn { display: block; width: 100%; padding: 14px; margin-top: 1rem; background: #C9A84C; color: #1B4332; border: none; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; }
  .btn:active { opacity: 0.8; }
  .btn-go { background: #4CAF50; color: white; font-size: 1.2rem; padding: 18px; }
  #log { margin-top: 1rem; font-size: 12px; opacity: 0.8; white-space: pre-wrap; max-height: 300px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 0.5rem; border-radius: 4px; }
  .auto-fix-banner { background: #FF5252; color: white; padding: 12px; border-radius: 8px; margin-bottom: 1rem; font-weight: 600; text-align: center; }
  .auto-fix-banner.done { background: #4CAF50; }
</style>
</head>
<body>
<h1>Railbird AI — Diagnostic v2</h1>

<div id="auto-fix-banner" class="auto-fix-banner" style="display:none;"></div>

<div class="section" id="versions"></div>
<div class="section" id="sw-status"></div>
<div class="section" id="cache-status"></div>
<div class="section" id="browser-info"></div>

<button class="btn" id="nuke-btn">NUCLEAR RESET — Clear Everything</button>
<button class="btn btn-go" id="go-btn" style="margin-top:0.5rem;">Open Fresh App →</button>

<div id="log"></div>

<script>
var logEl = document.getElementById('log');
function addLog(msg) {
  var ts = new Date().toLocaleTimeString();
  logEl.textContent += '[' + ts + '] ' + msg + '\n';
  logEl.scrollTop = logEl.scrollHeight;
}

// AUTO-FIX: Immediately try to clean up stale state
(async function autoFix() {
  var banner = document.getElementById('auto-fix-banner');
  banner.style.display = 'block';
  banner.textContent = 'Auto-fixing stale cache...';
  addLog('=== AUTO-FIX STARTED ===');

  var fixed = [];

  // 1. Register the self-destructing sw.js (forces browser to check for updates)
  if ('serviceWorker' in navigator) {
    try {
      // updateViaCache: 'none' tells browser to ALWAYS fetch sw.js from network
      var reg = await navigator.serviceWorker.register('sw.js?_v=' + Date.now(), {
        updateViaCache: 'none'
      });
      addLog('Registered self-destructing SW (will clear caches on activate)');

      // If there's already an active SW, force it to update
      if (reg.waiting) {
        addLog('New SW waiting — sending skip message');
        reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      }

      // Force update check
      try {
        await reg.update();
        addLog('Forced SW update check');
      } catch(e) { addLog('SW update check: ' + e.message); }

      fixed.push('SW registered');
    } catch(e) {
      addLog('SW register failed: ' + e.message);
    }

    // Also directly unregister all existing SWs as a backup
    try {
      var regs = await navigator.serviceWorker.getRegistrations();
      for (var i = 0; i < regs.length; i++) {
        await regs[i].unregister();
        addLog('Unregistered SW: ' + regs[i].scope);
      }
      if (regs.length > 0) fixed.push(regs.length + ' SW(s) unregistered');
    } catch(e) { addLog('SW unregister error: ' + e.message); }
  }

  // 2. Clear all Cache Storage
  if ('caches' in window) {
    try {
      var keys = await caches.keys();
      for (var j = 0; j < keys.length; j++) {
        await caches.delete(keys[j]);
        addLog('Deleted cache: ' + keys[j]);
      }
      if (keys.length > 0) fixed.push(keys.length + ' cache(s) cleared');
    } catch(e) { addLog('Cache clear error: ' + e.message); }
  }

  // 3. Clear localStorage version markers
  try {
    localStorage.removeItem('ne-racing-version');
    localStorage.removeItem('ne-racing-reload-count');
    addLog('Cleared version markers from localStorage');
    fixed.push('localStorage cleaned');
  } catch(e) {}

  if (fixed.length > 0) {
    banner.textContent = 'Auto-fixed: ' + fixed.join(', ');
    banner.className = 'auto-fix-banner done';
  } else {
    banner.textContent = 'Nothing to fix — browser state is clean';
    banner.className = 'auto-fix-banner done';
  }
  addLog('=== AUTO-FIX COMPLETE ===\n');

  // Now run diagnostics
  await runDiagnostics();
})();

async function runDiagnostics() {
  addLog('=== DIAGNOSTICS ===');

  // 1. VERSION CHECK
  var vSection = document.getElementById('versions');
  vSection.innerHTML = '<h2>Version Check</h2>';

  var serverVersion = 'FAILED';
  try {
    var r = await fetch('version.json?_nocache=' + Date.now(), { cache: 'no-store' });
    var d = await r.json();
    serverVersion = d.v;
  } catch(e) { addLog('version.json fetch failed: ' + e.message); }

  var htmlVersion = 'CHECKING...';
  try {
    var r2 = await fetch('index.html?_nocache=' + Date.now(), { cache: 'no-store' });
    var html = await r2.text();
    var m = html.match(/NE_APP_VERSION\s*=\s*'([^']+)'/);
    htmlVersion = m ? m[1] : 'NOT FOUND';
  } catch(e) { htmlVersion = 'FETCH FAILED'; addLog('index.html fetch failed: ' + e.message); }

  var swVersion = 'CHECKING...';
  try {
    var r3 = await fetch('sw.js?_nocache=' + Date.now(), { cache: 'no-store' });
    var swText = await r3.text();
    var m2 = swText.match(/APP_VERSION\s*=\s*'([^']+)'/);
    swVersion = m2 ? m2[1] : 'NOT FOUND';
  } catch(e) { swVersion = 'FETCH FAILED'; addLog('sw.js fetch failed: ' + e.message); }

  var allMatch = serverVersion === htmlVersion && htmlVersion === swVersion;
  vSection.innerHTML += '<div class="row"><span class="label">version.json</span><span class="value">' + serverVersion + '</span></div>';
  vSection.innerHTML += '<div class="row"><span class="label">index.html</span><span class="value">' + htmlVersion + '</span></div>';
  vSection.innerHTML += '<div class="row"><span class="label">sw.js</span><span class="value">' + swVersion + '</span></div>';
  vSection.innerHTML += '<div class="row"><span class="label">All match?</span><span class="value ' + (allMatch ? 'ok' : 'bad') + '">' + (allMatch ? 'YES ✓' : 'NO — MISMATCH') + '</span></div>';
  addLog('Versions: json=' + serverVersion + ' html=' + htmlVersion + ' sw=' + swVersion);

  // 2. SERVICE WORKER STATUS
  var swSection = document.getElementById('sw-status');
  swSection.innerHTML = '<h2>Service Worker</h2>';

  if ('serviceWorker' in navigator) {
    var regs = await navigator.serviceWorker.getRegistrations();
    swSection.innerHTML += '<div class="row"><span class="label">Registered SWs</span><span class="value ' + (regs.length === 0 ? 'ok' : 'bad') + '">' + regs.length + (regs.length === 0 ? ' ✓' : '') + '</span></div>';
    for (var i = 0; i < regs.length; i++) {
      var reg = regs[i];
      swSection.innerHTML += '<div class="row"><span class="label">SW #' + (i+1) + ' scope</span><span class="value">' + reg.scope + '</span></div>';
      swSection.innerHTML += '<div class="row"><span class="label">SW #' + (i+1) + ' state</span><span class="value">' + (reg.active ? reg.active.state : 'no active') + '</span></div>';
    }
    var ctrl = navigator.serviceWorker.controller;
    swSection.innerHTML += '<div class="row"><span class="label">Controlling SW?</span><span class="value ' + (ctrl ? 'bad' : 'ok') + '">' + (ctrl ? 'YES — intercepting' : 'NO ✓') + '</span></div>';
  } else {
    swSection.innerHTML += '<div class="row"><span class="label">Support</span><span class="value ok">Not supported (no SW issues)</span></div>';
  }

  // 3. CACHE STORAGE
  var cacheSection = document.getElementById('cache-status');
  cacheSection.innerHTML = '<h2>Cache Storage</h2>';
  if ('caches' in window) {
    var keys = await caches.keys();
    cacheSection.innerHTML += '<div class="row"><span class="label">Cache entries</span><span class="value ' + (keys.length === 0 ? 'ok' : 'warn') + '">' + keys.length + (keys.length === 0 ? ' ✓' : '') + '</span></div>';
    for (var j = 0; j < keys.length; j++) {
      var cache = await caches.open(keys[j]);
      var cacheKeys = await cache.keys();
      cacheSection.innerHTML += '<div class="row"><span class="label">' + keys[j] + '</span><span class="value">' + cacheKeys.length + ' items</span></div>';
    }
  }

  // 4. BROWSER INFO
  var browserSection = document.getElementById('browser-info');
  browserSection.innerHTML = '<h2>Browser</h2>';
  var isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
  browserSection.innerHTML += '<div class="row"><span class="label">Standalone PWA?</span><span class="value ' + (isStandalone ? 'warn' : 'ok') + '">' + (isStandalone ? 'YES — delete home icon and re-add' : 'NO ✓') + '</span></div>';
  var storedVer = localStorage.getItem('ne-racing-version');
  browserSection.innerHTML += '<div class="row"><span class="label">localStorage version</span><span class="value">' + (storedVer || 'none (clean)') + '</span></div>';
  browserSection.innerHTML += '<div class="row"><span class="label">User Agent</span><span class="value" style="font-size:10px">' + navigator.userAgent + '</span></div>';

  addLog('=== DIAGNOSTICS COMPLETE ===');
}

// NUCLEAR RESET
document.getElementById('nuke-btn').addEventListener('click', async function() {
  addLog('=== MANUAL NUCLEAR RESET ===');

  if ('serviceWorker' in navigator) {
    var regs = await navigator.serviceWorker.getRegistrations();
    for (var i = 0; i < regs.length; i++) {
      await regs[i].unregister();
      addLog('Unregistered SW: ' + regs[i].scope);
    }
  }

  if ('caches' in window) {
    var keys = await caches.keys();
    for (var j = 0; j < keys.length; j++) {
      await caches.delete(keys[j]);
      addLog('Deleted cache: ' + keys[j]);
    }
  }

  localStorage.clear();
  sessionStorage.clear();
  addLog('All storage cleared');

  await new Promise(function(r) { setTimeout(r, 1500); });
  addLog('DONE — reloading in 1s...');
  setTimeout(function() { window.location.reload(true); }, 1000);
});

// GO TO APP
document.getElementById('go-btn').addEventListener('click', function() {
  window.location.href = './?_purge=' + Date.now();
});
</script>
</body>
</html>
