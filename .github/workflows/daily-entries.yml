name: Daily Entries Pipeline
on:
  schedule:
    - cron: '0 12 * * 1-5'  # 8:00 AM ET (12:00 UTC) weekdays
  workflow_dispatch:

jobs:
  build-entries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --production || true
      - name: Build entries
        run: node scripts/build-entries.js
        env:
          NYRA_BASE: https://www.nyra.com
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: auto-update entries $(date +%Y-%m-%d)"
          git push
