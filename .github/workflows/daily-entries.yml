name: Daily Entries Pipeline (DISABLED)

# This workflow is intentionally disabled.
# It previously fetched NYRA entries on a daily cron, but the app has
# been refactored to use local fixtures + licensed adapters only.
# Re-enable ONLY against a permitted / licensed data source.
#
# To re-enable for a licensed feed: restore the `schedule:` trigger below
# and point the step at the licensed adapter (e.g. scripts/ingest/run.js
# with an adapter that has signed terms of service).

on:
  workflow_dispatch: {}

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: echo "Daily entries pipeline is disabled. Use a licensed adapter to re-enable."
