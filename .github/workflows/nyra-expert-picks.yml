name: NYRA Expert Picks (Saratoga)

# Scrapes NYRA's four public handicapper-picks pages for the Saratoga meet
# and publishes them into data/entries-SAR-{date}.json's per-race
# `expertPicks` field. That's the exact file/field worker.js's
# GET /api/expert-picks (handleExpertPicks) already reads from GitHub Pages,
# and app.html/index.html's fetchExpertPicksForCard() (v2.49.26) already
# fetches that endpoint and merges it into each race -- no worker or client
# changes needed to activate this, just keeping the file fresh.
#
# See docs/SARATOGA_NYRA.md for the full design and source list.
#
# IMPORTANT: NYRA's page markup is not a documented, versioned public
# contract, and scripts/lib/nyra-picks-parser.js was written without live
# network access to inspect the real pages. Run this via workflow_dispatch
# once and check the logged output (which parse strategy each source hit,
# or why it found nothing) before trusting the schedule below.

on:
  schedule:
    # Every 30 min, 11:00-19:00 UTC (~7am-3pm ET) covering typical Saratoga
    # post times during the meet. Cron is UTC.
    - cron: '*/30 11-19 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Dump each source''s raw fetched HTML as a downloadable artifact instead of committing (diagnostic run, no write)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch NYRA expert picks
        env:
          NYRA_DEBUG_DIR: ${{ inputs.debug && 'nyra-debug' || '' }}
        run: node scripts/fetch-nyra-expert-picks.js --track SAR ${{ inputs.debug && '--dry-run' || '' }}

      - name: Upload raw HTML (debug run only)
        if: ${{ inputs.debug }}
        uses: actions/upload-artifact@v4
        with:
          name: nyra-debug-html
          path: nyra-debug/
          retention-days: 3

      - name: Commit updated entries file
        if: ${{ !inputs.debug }}
        run: |
          git config user.name "railbird-bot"
          git config user.email "actions@users.noreply.github.com"
          # -f: .gitignore has a blanket `data/entries-SAR-*.json` rule (added
          # for QA-harness-regenerated rehearsal output) that also matches this
          # pipeline's legitimate output for any new date. Confirmed live
          # (2026-07-09 dry run): `git add` on an ignored path exits non-zero
          # without -f, which aborted this step under `bash -e` before it ever
          # reached the commit/push lines.
          git add -f data/entries-SAR-*.json
          git diff --cached --quiet || git commit -m "chore: refresh NYRA expert picks"
          git push
